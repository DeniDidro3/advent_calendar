<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>НАДЯ, ИСПЫТАЙ УДАЧУ!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Bungee&family=Fredoka:wght@600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    font-family: 'Fredoka', sans-serif;
    background:
      radial-gradient(circle at 10% 20%, #ff6ec4 0%, transparent 40%),
      radial-gradient(circle at 90% 10%, #ffd93d 0%, transparent 40%),
      radial-gradient(circle at 50% 90%, #6bcfff 0%, transparent 45%),
      radial-gradient(circle at 20% 80%, #b388ff 0%, transparent 40%),
      linear-gradient(135deg, #ff9a9e 0%, #fad0c4 30%, #fbc2eb 60%, #a18cd1 100%);
    background-attachment: fixed;
    min-height: 100vh;
    padding: 20px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(circle, #ffeb3b 3px, transparent 4px),
      radial-gradient(circle, #ff4081 3px, transparent 4px),
      radial-gradient(circle, #00e676 3px, transparent 4px),
      radial-gradient(circle, #2196f3 3px, transparent 4px);
    background-size: 80px 80px, 120px 120px, 100px 100px, 140px 140px;
    background-position: 0 0, 40px 60px, 20px 30px, 70px 90px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
    animation: confettiMove 30s linear infinite;
  }

  @keyframes confettiMove {
    0% { background-position: 0 0, 40px 60px, 20px 30px, 70px 90px; }
    100% { background-position: 80px 80px, 120px 180px, 120px 130px, 210px 230px; }
  }

  /* ====== ЗАСТАВКА (INTRO) ====== */
  .intro {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #f5e8d8;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Расходящиеся красные лучи (стиль японского "восходящего солнца") */
  .rays {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 250vmax;
    height: 250vmax;
    transform: translate(-50%, -50%);
    background: conic-gradient(
      from 0deg,
      #c1272d 0deg 18deg, transparent 18deg 36deg,
      #c1272d 36deg 54deg, transparent 54deg 72deg,
      #c1272d 72deg 90deg, transparent 90deg 108deg,
      #c1272d 108deg 126deg, transparent 126deg 144deg,
      #c1272d 144deg 162deg, transparent 162deg 180deg,
      #c1272d 180deg 198deg, transparent 198deg 216deg,
      #c1272d 216deg 234deg, transparent 234deg 252deg,
      #c1272d 252deg 270deg, transparent 270deg 288deg,
      #c1272d 288deg 306deg, transparent 306deg 324deg,
      #c1272d 324deg 342deg, transparent 342deg 360deg
    );
    animation: raysRotate 20s linear infinite;
    filter: blur(0.5px);
  }

  /* Виньетка и винтажная текстура поверх лучей */
  .rays-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at center, transparent 0%, rgba(245, 232, 216, 0.15) 60%, rgba(245, 232, 216, 0.45) 100%),
      radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 60%, rgba(0,0,0,0.07) 0%, transparent 50%);
    pointer-events: none;
  }

  @keyframes raysRotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .intro-word {
    position: absolute;
    font-family: 'Bungee Shade', cursive;
    font-size: clamp(3.5rem, 14vw, 11rem);
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(
      45deg,
      #ff0099 0%,
      #ffcc00 20%,
      #00ff88 40%,
      #00ccff 60%,
      #ff3366 80%,
      #9933ff 100%
    );
    background-size: 400% 400%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-stroke: 4px #fff;
    color: transparent;
    text-shadow:
      0 0 30px rgba(255, 255, 255, 0.8),
      8px 8px 0 #000,
      10px 10px 0 #ff00aa;
    opacity: 0;
    transform: scale(0.3) rotate(-15deg);
    text-align: center;
    white-space: nowrap;
    animation: rainbowShift 1.5s ease infinite;
  }

  @keyframes rainbowShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .intro-word.show {
    animation:
      rainbowShift 1.5s ease infinite,
      wordAppear 2s ease forwards;
  }

  @keyframes wordAppear {
    0% { opacity: 0; transform: scale(0.3) rotate(-15deg); }
    15% { opacity: 1; transform: scale(1.15) rotate(3deg); }
    25% { transform: scale(1) rotate(-2deg); }
    80% { opacity: 1; transform: scale(1) rotate(-2deg); }
    100% { opacity: 0; transform: scale(1.3) rotate(5deg); }
  }

  .intro.fade-out {
    animation: introFadeOut 0.8s ease forwards;
  }

  @keyframes introFadeOut {
    to { opacity: 0; visibility: hidden; }
  }

  /* Основной интерфейс — выезжает снизу */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    transform: translateY(100vh);
    transition: transform 1.2s cubic-bezier(0.34, 1.3, 0.64, 1);
  }

  .container.slide-up {
    transform: translateY(0);
  }

  /* ===== ЗАГОЛОВОК ===== */
  .header {
    text-align: center;
    padding: 30px 10px 20px;
    position: relative;
  }

  .stars-decoration {
    font-size: 2rem;
    margin-bottom: 10px;
    letter-spacing: 10px;
    animation: wobble 2s ease-in-out infinite;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  .title {
    font-family: 'Bungee Shade', cursive;
    font-size: clamp(2.2rem, 7vw, 5.5rem);
    line-height: 1;
    letter-spacing: 2px;
    background: linear-gradient(
      45deg,
      #ff0099 0%, #ffcc00 25%, #00ccff 50%, #ff3366 75%, #9933ff 100%
    );
    background-size: 300% 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-stroke: 3px #fff;
    color: transparent;
    text-shadow:
      6px 6px 0 #000,
      8px 8px 0 #ff00aa,
      10px 10px 20px rgba(0,0,0,0.3);
    animation: gradientShift 4s ease infinite, titleBounce 1.8s ease-in-out infinite;
    transform: rotate(-2deg);
    display: inline-block;
    padding: 10px 20px;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  @keyframes titleBounce {
    0%, 100% { transform: rotate(-2deg) translateY(0); }
    50% { transform: rotate(2deg) translateY(-8px); }
  }

  .subtitle {
    font-family: 'Bungee', cursive;
    font-size: clamp(0.9rem, 2.2vw, 1.4rem);
    color: #fff;
    background: #d6336c;
    display: inline-block;
    padding: 8px 25px;
    border-radius: 50px;
    margin-top: 20px;
    transform: rotate(2deg);
    box-shadow: 0 5px 0 #8b1f3f, 0 8px 20px rgba(0,0,0,0.3);
    border: 4px dashed #ffeb3b;
  }

  .instructions {
    margin: 30px auto 20px;
    max-width: 600px;
    background: rgba(255,255,255,0.92);
    border: 4px solid #ff4081;
    border-radius: 25px;
    padding: 18px 25px;
    text-align: center;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: #4a148c;
    font-weight: 600;
    box-shadow: 0 8px 0 #ad1457, 0 12px 30px rgba(0,0,0,0.2);
    transform: rotate(-1deg);
  }

  .instructions span {
    display: inline-block;
    font-size: 1.4rem;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ===== СЕТКА КАРТОЧЕК (6 ШТУК = 3x2) ===== */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin: 30px auto;
    max-width: 700px;
    padding: 0 10px;
  }

  .card {
    aspect-ratio: 1;
    position: relative;
    cursor: pointer;
    perspective: 1000px;
    transition: transform 0.3s ease;
  }

  .card:hover:not(.opened) {
    transform: scale(1.05) rotate(-2deg);
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    overflow: hidden;
    box-shadow:
      0 6px 0 #4a148c,
      0 10px 25px rgba(0,0,0,0.35);
    border: 5px solid #fff;
    background: linear-gradient(135deg, #ff4081, #7c4dff, #00bcd4);
  }

  .card-question {
    width: 100%;
    height: 100%;
    background:
      repeating-linear-gradient(
        45deg,
        #ff4081 0px, #ff4081 15px,
        #ffeb3b 15px, #ffeb3b 30px,
        #00bcd4 30px, #00bcd4 45px,
        #7c4dff 45px, #7c4dff 60px
      );
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .card-question::before {
    content: '?';
    font-family: 'Bungee Shade', cursive;
    font-size: clamp(3rem, 8vw, 5.5rem);
    color: #fff;
    -webkit-text-stroke: 4px #000;
    text-shadow: 4px 4px 0 #ffeb3b, 6px 6px 10px rgba(0,0,0,0.5);
    animation: questionPulse 1.5s ease-in-out infinite;
  }

  @keyframes questionPulse {
    0%, 100% { transform: scale(1) rotate(-5deg); }
    50% { transform: scale(1.15) rotate(5deg); }
  }

  .card-number {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #fff;
    color: #d6336c;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    border: 3px solid #d6336c;
    z-index: 2;
  }

  /* ===== МОДАЛКА ===== */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    backdrop-filter: blur(8px);
  }

  .modal-overlay.active {
    display: flex;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-card {
    position: relative;
    width: min(90vw, 90vh, 600px);
    aspect-ratio: 1 / 1;
    border-radius: 25px;
    overflow: hidden;
    box-shadow:
      0 0 0 8px #fff,
      0 0 0 14px #ff4081,
      0 0 60px rgba(255, 64, 129, 0.8);
    animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalPop {
    0% { transform: scale(0.3) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .reveal-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    aspect-ratio: 1 / 1;
    background: #fff;
  }

  .scratch-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: grab;
    touch-action: none;
  }

  .scratch-canvas:active { cursor: grabbing; }

  .scratch-hint {
    position: absolute;
    bottom: -55px;
    left: 0; right: 0;
    text-align: center;
    color: #fff;
    font-family: 'Bungee', cursive;
    font-size: 1rem;
    text-shadow: 2px 2px 0 #d6336c, 0 0 10px rgba(0,0,0,0.5);
    animation: hintBounce 1s ease-in-out infinite;
  }

  @keyframes hintBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .close-btn {
    position: absolute;
    top: -50px;
    right: 0;
    background: #fff;
    border: 4px solid #ff4081;
    color: #ff4081;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s;
  }

  .close-btn:hover { transform: rotate(90deg) scale(1.1); }

  .card.opened .card-question {
    opacity: 0.4;
    filter: grayscale(0.5);
  }

  .card.opened .card-question::before {
    content: '✓';
    color: #00e676;
    -webkit-text-stroke: 4px #fff;
  }

  /* ===== КНОПКА МУЗЫКИ ===== */
  .music-toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 500;
    background: #fff;
    border: 4px solid #ff4081;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s;
  }

  .music-toggle:hover { transform: scale(1.1) rotate(15deg); }

  .music-toggle.playing {
    animation: musicPulse 1s ease-in-out infinite;
  }

  @keyframes musicPulse {
    0%, 100% { box-shadow: 0 4px 15px rgba(255, 64, 129, 0.5); }
    50% { box-shadow: 0 4px 25px rgba(255, 64, 129, 0.9), 0 0 0 8px rgba(255, 64, 129, 0.2); }
  }

  @media (max-width: 500px) {
    .cards-grid { gap: 12px; max-width: 100%; }
    .stars-decoration { font-size: 1.5rem; letter-spacing: 5px; }
  }
</style>
</head>
<body>

<!-- ====== ЗАСТАВКА ====== -->
<div class="intro" id="intro">
  <div class="rays"></div>
  <div class="rays-overlay"></div>
  <div class="intro-word" id="word1">НАДЯ</div>
  <div class="intro-word" id="word2">ИСПЫТАЙ</div>
  <div class="intro-word" id="word3">УДАЧУ</div>
</div>

<!--
  ====== МУЗЫКА ======
  ВСТАВЬ ССЫЛКУ НА АУДИОФАЙЛ В АТРИБУТ src НИЖЕ.
  Поддерживаются: .mp3, .wav, .ogg, .m4a
  Примеры:
    src="music.mp3"            (файл рядом с html)
    src="https://example.com/song.mp3"   (прямая ссылка)
-->
<audio id="bgMusic" loop>
  <source src="https://audio.jukehost.co.uk/019e1cab-2ba9-72b1-a418-e9ac4406ea75" type="audio/mpeg">
</audio>

<button class="music-toggle" id="musicToggle" title="Музыка вкл/выкл">🔇</button>

<!-- ====== ОСНОВНОЙ ИНТЕРФЕЙС ====== -->
<div class="container" id="mainContainer">

  <div class="header">
    <div class="stars-decoration">⭐ 🎰 🎲 🎁 🎰 ⭐</div>
    <h1 class="title">НАДЯ,<br>ИСПЫТАЙ УДАЧУ!</h1>
    <div class="subtitle">🎉 СУПЕР-МЕГА-ЛОТЕРЕЯ 🎉</div>
  </div>

  <div class="instructions">
    <span>👆</span> Жми на карточку и стирай её пальцем или мышкой! <span>🪙</span>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>

</div>

<!-- Модалка -->
<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <button class="close-btn" id="closeBtn">✕</button>
    <!--
      ВСТАВЬ СВОИ ИЗОБРАЖЕНИЯ В МАССИВ `images` НИЖЕ В СКРИПТЕ.
      ИДЕАЛЬНЫЙ ФОРМАТ: 2000 x 2000 px.
    -->
    <img class="reveal-image" id="revealImage" src="" alt="Приз">
    <canvas class="scratch-canvas" id="scratchCanvas"></canvas>
    <div class="scratch-hint">✨ Води по экрану, чтобы стереть ✨</div>
  </div>
</div>

<script>
  // ====== ПУТИ К ИЗОБРАЖЕНИЯМ (6 ШТУК, формат 2000×2000) ======
  const images = [
    'https://i.postimg.cc/W4m0cxfQ/XXXL-(11)-5.jpg', // карточка 1
    'https://i.postimg.cc/dVgKcxTp/ozon-2000.png', // карточка 2
    'https://i.postimg.cc/Wz5QWWvD/2zpxqs462hs78cvj4773nyc0l5qn8wn4.png', // карточка 3
    'https://i.postimg.cc/J4gFsB4M/d3r8augx82wmyl7ywfn9lo79x3g1qrwn.png', // карточка 4
    'https://i.postimg.cc/8PDYMVLK/unnamed-16.png', // карточка 5
    'https://i.postimg.cc/6qhYYyCj/5e0276c1-cc98-45a0-95e8-537303a9dcad-720x720.jpg'  // карточка 6
  ];

  // ====== ЗАСТАВКА: последовательность слов ======
  const word1 = document.getElementById('word1');
  const word2 = document.getElementById('word2');
  const word3 = document.getElementById('word3');
  const intro = document.getElementById('intro');
  const mainContainer = document.getElementById('mainContainer');

  // НАДЯ — 0...2 сек
  setTimeout(() => word1.classList.add('show'), 100);
  // ИСПЫТАЙ — 2...4 сек
  setTimeout(() => word2.classList.add('show'), 2100);
  // УДАЧУ — 4...6 сек
  setTimeout(() => word3.classList.add('show'), 4100);
  // Через 6 сек — заставка тает, интерфейс выезжает снизу
  setTimeout(() => {
    intro.classList.add('fade-out');
    mainContainer.classList.add('slide-up');
  }, 6100);
  setTimeout(() => { intro.style.display = 'none'; }, 7000);

  // ====== МУЗЫКА ======
  const music = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicToggle');
  let musicPlaying = false;

  musicBtn.addEventListener('click', () => {
    if (musicPlaying) {
      music.pause();
      musicBtn.textContent = '🔇';
      musicBtn.classList.remove('playing');
    } else {
      music.play().catch(err => console.log('Не удалось запустить:', err));
      musicBtn.textContent = '🎵';
      musicBtn.classList.add('playing');
    }
    musicPlaying = !musicPlaying;
  });

  // Браузеры блокируют автоплей — запускаем после первого клика/тапа
  document.addEventListener('click', function tryPlay() {
    music.play().then(() => {
      musicPlaying = true;
      musicBtn.textContent = '🎵';
      musicBtn.classList.add('playing');
    }).catch(() => {});
    document.removeEventListener('click', tryPlay);
  }, { once: true });

  // ====== ГЕНЕРАЦИЯ 6 КАРТОЧЕК ======
  const grid = document.getElementById('cardsGrid');
  for (let i = 0; i < 6; i++) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-number">${i + 1}</div>
        <div class="card-question"></div>
      </div>
    `;
    card.addEventListener('click', () => openCard(i));
    grid.appendChild(card);
  }

  // ====== МОДАЛКА И СКРЕТЧ ======
  const modal = document.getElementById('modal');
  const closeBtn = document.getElementById('closeBtn');
  const revealImg = document.getElementById('revealImage');
  const canvas = document.getElementById('scratchCanvas');
  const ctx = canvas.getContext('2d');
  let currentCardIndex = null;
  let isDrawing = false;

  function openCard(index) {
    currentCardIndex = index;
    revealImg.src = images[index];
    modal.classList.add('active');
    requestAnimationFrame(() => setupCanvas());
  }

  function setupCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;

    const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    gradient.addColorStop(0, '#c0c0c0');
    gradient.addColorStop(0.3, '#e8e8e8');
    gradient.addColorStop(0.5, '#a8a8a8');
    gradient.addColorStop(0.7, '#d0d0d0');
    gradient.addColorStop(1, '#909090');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
    ctx.font = 'bold ' + (canvas.width / 10) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎲 СТИРАЙ 🎲', canvas.width / 2, canvas.height / 2 - canvas.height / 6);
    ctx.fillText('💰💰💰', canvas.width / 2, canvas.height / 2);
    ctx.fillText('🍀 УДАЧИ 🍀', canvas.width / 2, canvas.height / 2 + canvas.height / 6);

    ctx.globalCompositeOperation = 'destination-out';
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches && e.touches.length) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function scratch(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const { x, y } = getPos(e);
    const radius = Math.max(canvas.width / 12, 30);
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    checkScratchedPercent();
  }

  function checkScratchedPercent() {
    if (Math.random() > 0.05) return;
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const pixels = imageData.data;
    let transparent = 0;
    const total = pixels.length / 4;
    for (let i = 3; i < pixels.length; i += 4 * 20) {
      if (pixels[i] < 50) transparent++;
    }
    const ratio = (transparent / (total / 20));
    if (ratio > 0.55) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      markAsOpened();
    }
  }

  function markAsOpened() {
    if (currentCardIndex !== null) {
      const cards = document.querySelectorAll('.card');
      cards[currentCardIndex].classList.add('opened');
    }
  }

  canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(e); });
  canvas.addEventListener('mousemove', scratch);
  canvas.addEventListener('mouseup', () => { isDrawing = false; });
  canvas.addEventListener('mouseleave', () => { isDrawing = false; });
  canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); }, { passive: false });
  canvas.addEventListener('touchmove', scratch, { passive: false });
  canvas.addEventListener('touchend', () => { isDrawing = false; });

  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  function closeModal() {
    markAsOpened();
    modal.classList.remove('active');
    currentCardIndex = null;
  }

  window.addEventListener('resize', () => {
    if (modal.classList.contains('active')) setupCanvas();
  });
</script>

</body>
</html>
